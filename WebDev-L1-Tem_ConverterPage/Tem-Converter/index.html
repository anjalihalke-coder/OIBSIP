<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="stage">

    <header class="page-head">
      <p class="eyebrow">Instrument Panel</p>
      <h1>Temperature Converter</h1>
      <p class="subhead">Read one scale. See all three.</p>
    </header>

    <div class="console">

      <!-- Signature thermometer visual -->
      <section class="gauge" aria-hidden="true">
        <div class="gauge__scale">
          <span>50</span>
          <span>0</span>
          <span>-50</span>
        </div>
        <div class="gauge__tube">
          <div class="gauge__fill" id="mercuryFill"></div>
          <div class="gauge__ticks"></div>
        </div>
        <div class="gauge__bulb">
          <div class="gauge__bulb-fill" id="bulbFill"></div>
        </div>
      </section>

      <!-- Controls + results -->
      <section class="panel">

        <form class="input-block" id="converterForm" novalidate>

          <div class="field">
            <label for="tempValue">Temperature value</label>
            <input
              type="text"
              inputmode="decimal"
              id="tempValue"
              name="tempValue"
              placeholder="e.g. 37"
              autocomplete="off"
              aria-describedby="inputError"
            >
            <p class="error-msg" id="inputError" role="alert"></p>
          </div>

          <fieldset class="field unit-select">
            <legend>Input unit</legend>
            <div class="radio-row">
              <label class="radio-pill">
                <input type="radio" name="unit" value="C" checked>
                <span>°C</span>
              </label>
              <label class="radio-pill">
                <input type="radio" name="unit" value="F">
                <span>°F</span>
              </label>
              <label class="radio-pill">
                <input type="radio" name="unit" value="K">
                <span>K</span>
              </label>
            </div>
          </fieldset>

          <button type="submit" class="convert-btn">Convert</button>

        </form>

        <div class="results" id="results">
          <div class="result-card" data-unit="C">
            <p class="result-label">Celsius</p>
            <p class="result-value"><span id="outC">—</span><span class="result-unit">°C</span></p>
          </div>
          <div class="result-card" data-unit="F">
            <p class="result-label">Fahrenheit</p>
            <p class="result-value"><span id="outF">—</span><span class="result-unit">°F</span></p>
          </div>
          <div class="result-card" data-unit="K">
            <p class="result-label">Kelvin</p>
            <p class="result-value"><span id="outK">—</span><span class="result-unit">K</span></p>
          </div>
        </div>

      </section>
    </div>

  </main>

<script src="script.js"></script>
</body>
</html>
